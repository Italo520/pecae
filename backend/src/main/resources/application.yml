# ============================================================
# PECAÊ API — Configuração Principal (Spring Boot)
# ============================================================

server:
  port: ${PORT:8080}
  servlet:
    context-path: /api/v1

spring:
  application:
    name: pecae-api

  # ── JPA / Hibernate ──
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public
        jdbc:
          time_zone: America/Sao_Paulo
    show-sql: false

  # ── Datasource ──
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/pecae}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # ── Flyway ──
  flyway:
    enabled: false
    baseline-on-migrate: true
    baseline-version: "0"
    locations: classpath:db/migration
    validate-on-migrate: true

  # ── Redis ──
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 5000

  # ── Cache ──
  cache:
    type: none
    redis:
      time-to-live: 3600000
      cache-null-values: false

  # ── Mail ──
  mail:
    host: ${MAIL_HOST:smtp.resend.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:resend}
    password: ${RESEND_API_KEY:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  # ── Jackson ──
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null
    time-zone: America/Sao_Paulo

  # ── Virtual Threads ──
  threads:
    virtual:
      enabled: true

  # ── Servlet (multipart upload) ──
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

# ── JWT ──
jwt:
  secret: ${JWT_SECRET:default-dev-secret-change-in-production}
  expiration: ${JWT_EXPIRATION:86400000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}

# ── Google OAuth ──
google:
  client-id: ${GOOGLE_CLIENT_ID:}

# ── Supabase Storage ──
storage:
  type: ${STORAGE_TYPE:supabase}
  supabase:
    url: ${SUPABASE_URL:}
    key: ${SUPABASE_SERVICE_KEY:}
    bucket: ${SUPABASE_BUCKET:uploads}

# ── Email ──
mail:
  from: ${EMAIL_FROM:noreply@pecae.com.br}
  app-name: PECAÊ

# ── CORS ──
cors:
  allowed-origins: ${CORS_ORIGIN:*}

# ── Expo Push ──
expo:
  push:
    url: https://exp.host/--/api/v2/push/send

# ── OpenAPI / Swagger ──
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha
  default-produces-media-type: application/json

# ── Actuator ──
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

# ── Logging ──
logging:
  level:
    com.pecae: DEBUG
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql: WARN
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
