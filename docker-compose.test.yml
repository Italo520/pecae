# ============================================================
# PECAÊ — Docker Compose para Testes E2E
# Ambiente isolado: PostgreSQL (5433) + Redis (6380)
# ============================================================
services:
  database-test:
    image: postgres:16-alpine
    container_name: pecae-postgres-test
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: test123
      POSTGRES_DB: pecae_test_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pecae_test_db"]
      interval: 3s
      timeout: 3s
      retries: 5

  redis-test:
    image: redis:7-alpine
    container_name: pecae-redis-test
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis_test_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 5



volumes:
  postgres_test_data:
  redis_test_data:

