services:

  pecae-postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: pecae
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - pecae-network

  pecae-redis:
    image: public.ecr.aws/docker/library/redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - pecae-network

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    # ports:
    #   - "3000:3000"
    environment:
      - SERVER_PORT=${PORT:-3000}
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=${DATABASE_URL:-jdbc:postgresql://pecae-postgres:5432/pecae}
      - SPRING_DATASOURCE_USERNAME=${DB_USERNAME:-postgres}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - SPRING_DATA_REDIS_HOST=pecae-redis
      - SPRING_DATA_REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - EMAIL_FROM=${EMAIL_FROM:-noreply@pecae.com.br}
      - STORAGE_TYPE=${STORAGE_TYPE:-mock}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - ADMIN_SEED_EMAIL=${ADMIN_SEED_EMAIL}
      - ADMIN_SEED_PASSWORD=${ADMIN_SEED_PASSWORD}
    labels:
      - traefik.enable=true
      - traefik.http.routers.pecae-api.rule=Host(`${SERVICE_FQDN_API:-api-pecae.italohub.cloud}`)
      - traefik.http.routers.pecae-api.entrypoints=https
      - traefik.http.routers.pecae-api.tls=true
      - traefik.http.routers.pecae-api.tls.certresolver=letsencrypt
      - traefik.http.services.pecae-api.loadbalancer.server.port=3000
      - traefik.docker.network=coolify
    depends_on:
      pecae-redis:
        condition: service_healthy
      pecae-postgres:
        condition: service_healthy
    networks:
      - pecae-network
      - coolify

  web-frontend:
    build:
      context: .
      dockerfile: web-frontend/Dockerfile
    restart: always
    environment:
      - NODE_ENV=production
      - HOSTNAME=0.0.0.0
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-https://api-pecae.italohub.cloud/api/v1}
      - API_URL=${API_URL:-http://api:3000/api/v1}
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    labels:
      - traefik.enable=true
      - traefik.http.routers.pecae-web.rule=Host(`${SERVICE_FQDN_WEB:-web.pecae.italohub.cloud}`)
      - traefik.http.routers.pecae-web.entrypoints=https
      - traefik.http.routers.pecae-web.tls=true
      - traefik.http.routers.pecae-web.tls.certresolver=letsencrypt
      - traefik.http.services.pecae-web.loadbalancer.server.port=3000
      - traefik.docker.network=coolify
    depends_on:
      - api
    networks:
      - pecae-network
      - coolify

volumes:
  redis_data:
  postgres_data:

networks:
  pecae-network:
    driver: bridge
  coolify:
    external: true
