services:

  pecae-redis:
    image: public.ecr.aws/docker/library/redis:7-alpine
    restart: always
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - pecae-network

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: always
    # ports:
    #   - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - DIRECT_URL=${DIRECT_URL}
      - REDIS_HOST=pecae-redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET}
      - PORT=3000
      - RESEND_API_KEY=${RESEND_API_KEY}
      - EMAIL_FROM=${EMAIL_FROM:-noreply@pecae.com.br}
      - STORAGE_TYPE=${STORAGE_TYPE:-mock}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - ADMIN_SEED_EMAIL=${ADMIN_SEED_EMAIL}
      - ADMIN_SEED_PASSWORD=${ADMIN_SEED_PASSWORD}
    labels:
      - traefik.enable=true
      - traefik.http.routers.pecae-api.rule=Host(`${SERVICE_FQDN_API:-api-pecae.italohub.cloud}`)
      - traefik.http.routers.pecae-api.entrypoints=https
      - traefik.http.routers.pecae-api.tls=true
      - traefik.http.routers.pecae-api.tls.certresolver=letsencrypt
      - traefik.http.services.pecae-api.loadbalancer.server.port=3000
      - traefik.docker.network=coolify
    depends_on:
      pecae-redis:
        condition: service_healthy
    networks:
      - pecae-network
      - coolify

  mobile-web:
    build:
      context: .
      dockerfile: apps/mobile/Dockerfile
      args:
        EXPO_PUBLIC_API_URL: ${EXPO_PUBLIC_API_URL:-https://api-pecae.italohub.cloud/api/v1}
        EXPO_PUBLIC_SUPABASE_URL: https://hsxeulvcfrbyvxehhhaj.supabase.co
        EXPO_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhzeGV1bHZjZnJieXZ4ZWhoaGFqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA4OTU0NjQsImV4cCI6MjA5NjQ3MTQ2NH0.gl7nMqpNt-5-AQb39OogZUsTTzcoqtr0esoumTUu6c0
    restart: always
    # ports:
    #   - "8080:80"
    labels:
      - traefik.enable=true
      - traefik.http.routers.pecae-mobile-web.rule=Host(`${SERVICE_FQDN_MOBILE_WEB:-pecae.italohub.cloud}`)
      - traefik.http.routers.pecae-mobile-web.entrypoints=https
      - traefik.http.routers.pecae-mobile-web.tls=true
      - traefik.http.routers.pecae-mobile-web.tls.certresolver=letsencrypt
      - traefik.http.services.pecae-mobile-web.loadbalancer.server.port=80
      - traefik.docker.network=coolify
    depends_on:
      - api
    networks:
      - pecae-network
      - coolify

volumes:
  redis_data:

networks:
  pecae-network:
    driver: bridge
  coolify:
    external: true
